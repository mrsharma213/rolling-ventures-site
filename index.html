<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolling Ventures</title>
  <meta name="description" content="Rolling Ventures — Backing culture before it scales.">

  <!-- Social / OG -->
  <meta property="og:title" content="Rolling Ventures">
  <meta property="og:description" content="Backing culture before it scales.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rollingventures.com">
  <meta property="og:image" content="https://mrsharma213.github.io/rolling-ventures-site/images/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rolling Ventures">
  <meta name="twitter:description" content="Backing culture before it scales.">
  <meta name="twitter:image" content="https://mrsharma213.github.io/rolling-ventures-site/images/og-image.jpg">

  <!-- Favicon / App Icon -->
  <link rel="icon" type="image/svg+xml" href="images/rv-logo.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="images/rv-logo.svg">
  <meta name="theme-color" content="#111" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ---- Theme variables ---- */
    :root {
      --bg: #fff;
      --fg: #111;
      --fg2: #444;
      --fg3: #888;
      --label: #aaa;
      --border: #111;
      --border-light: #bbb;
      --hover-bg: #111;
      --hover-fg: #fff;
      --modal-bg: #fff;
      --modal-overlay: rgba(0,0,0,0.4);
      --input-border: #ddd;
      --btn-bg: #111;
      --btn-fg: #fff;
      --btn-hover: #333;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --fg: #f0f0f0;
        --fg2: #bbb;
        --fg3: #777;
        --label: #666;
        --border: #f0f0f0;
        --border-light: #555;
        --hover-bg: #f0f0f0;
        --hover-fg: #0a0a0a;
        --modal-bg: #151515;
        --modal-overlay: rgba(0,0,0,0.6);
        --input-border: #333;
        --btn-bg: #f0f0f0;
        --btn-fg: #0a0a0a;
        --btn-hover: #ddd;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 15vh 32px 48px;
    }

    /* H1 — Rolling Ventures */
    .h1 {
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    /* H2 — Tagline */
    .h2 {
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--fg2);
      margin-bottom: 16px;
    }

    /* H3 — Supporting copy */
    .h3 {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--fg3);
      line-height: 1.55;
      max-width: 360px;
      margin-bottom: 44px;
    }

    /* Section label */
    .label {
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--label);
      margin-bottom: 20px;
    }

    /* Logo grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 24px;
      align-items: center;
      justify-items: center;
      width: 100%;
      max-width: 520px;
      margin-bottom: 44px;
    }

    .grid a, .grid span {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 42px;
    }

    .grid a { transition: opacity 0.15s ease; }
    .grid a:hover { opacity: 0.5; }

    .grid img {
      max-height: 34px;
      max-width: 105px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* Invert logos in dark mode so they stay visible */
    @media (prefers-color-scheme: dark) {
      .grid img { filter: invert(1); }
    }

    /* CTA — outlined button */
    .cta {
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--fg);
      text-decoration: none;
      border: 1.5px solid var(--border);
      padding: 12px 40px;
      border-radius: 2px;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.15s ease, color 0.15s ease;
      display: inline-block;
    }
    .cta:hover { background: var(--hover-bg); color: var(--hover-fg); }

    /* ---- Modal ---- */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--modal-bg);
      width: 90%;
      max-width: 400px;
      padding: 32px 24px 28px;
      border-radius: 4px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--fg3);
      line-height: 1;
      transition: color 0.15s;
    }
    .close:hover { color: var(--fg); }

    .modal h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .f { margin-bottom: 14px; text-align: left; }

    .f label {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--label);
      margin-bottom: 5px;
    }

    .f input, .f textarea {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 9px 11px;
      border: 1px solid var(--input-border);
      border-radius: 3px;
      color: var(--fg);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .f input:focus, .f textarea:focus { border-color: var(--fg); }
    .f textarea { height: 80px; resize: vertical; }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 3px;
      padding: 11px 0;
      width: 100%;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--btn-hover); }

    .ok { display: none; text-align: center; padding: 16px 0 4px; }
    .ok h2 { margin-bottom: 6px; }
    .ok p { font-size: 0.85rem; font-weight: 300; color: var(--fg3); }

    /* ---- Mobile ---- */
    @media (max-width: 520px) {
      .page { padding: 12vh 20px 36px; }
      .h1 { font-size: 1.8rem; }
      .h2 { font-size: 1.05rem; }
      .h3 { font-size: 0.82rem; margin-bottom: 32px; }
      .cta { font-size: 1.05rem; }
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px 16px;
        margin-bottom: 32px;
      }
      .grid a, .grid span { height: 34px; }
      .grid img { max-height: 26px; max-width: 80px; }
    }

    @media (max-height: 700px) {
      .page { padding-top: 8vh; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="h1">Rolling Ventures</h1>
    <h2 class="h2">Backing culture before it scales</h2>
    <p class="h3">We make select investments throughout the year. To be considered, get in touch.</p>
    <p class="label">Select Investments</p>
    <div class="grid">
      <a href="https://www.eventbrite.com/cc/refuge-nyc-upcoming-shows-4796860" target="_blank" rel="noopener"><img src="images/refuge.svg" alt="Refuge"></a>
      <span><img src="images/mrbeast.png" alt="MrBeast"></span>
      <a href="https://mocama.com/" target="_blank" rel="noopener"><img src="images/mocama.png" alt="Mocama"></a>
      <span><img src="images/diamond-supply.png" alt="Diamond Supply"></span>
      <a href="https://getswishables.com/" target="_blank" rel="noopener"><img src="images/swishables.png" alt="Swishables"></a>
      <a href="https://www.midlinemiami.com/" target="_blank" rel="noopener"><img src="images/midline.png" alt="Midline"></a>
      <a href="https://goodonyaorganic.com/" target="_blank" rel="noopener"><img src="images/goodonya.png" alt="GoodOnya"></a>
      <span><img src="images/ketchy-shuby.png" alt="Ketchy Shuby"></span>
      <a href="https://www.outersignal.com/" target="_blank" rel="noopener"><img src="images/outersignal.png" alt="OuterSignal"></a>
      <a href="https://drinksprinter.com/" target="_blank" rel="noopener"><img src="images/sprinter.png" alt="Sprinter"></a>
      <span><img src="images/willies-remedy.jpg" alt="Willie's Remedy"></span>
    </div>
    <a class="cta" onclick="document.getElementById('m').classList.add('open')">Get in touch</a>
  </div>

  <div class="overlay" id="m">
    <div class="modal">
      <button class="close" onclick="cm()">&times;</button>
      <div id="fw">
        <h2>Get in touch</h2>
        <form id="rf" onsubmit="return sf(event)">
          <div class="f"><label for="n">Name</label><input type="text" id="n" name="name" required></div>
          <div class="f"><label for="e">Email</label><input type="email" id="e" name="email" required></div>
          <div class="f"><label for="mg">Message</label><textarea id="mg" name="message" required></textarea></div>
          <button type="submit" class="btn">Send</button>
        </form>
      </div>
      <div class="ok" id="ok"><h2>Thank you</h2><p>We'll be in touch.</p></div>
    </div>
  </div>

  <script>
    function cm(){var o=document.getElementById('m');o.classList.remove('open');setTimeout(function(){document.getElementById('fw').style.display='';document.getElementById('ok').style.display='none'},300)}
    document.getElementById('m').addEventListener('click',function(e){if(e.target===this)cm()});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')cm()});
    function sf(e){e.preventDefault();var n=document.getElementById('n').value,em=document.getElementById('e').value,mg=document.getElementById('mg').value;window.location.href='mailto:hello@rollingventures.com?subject='+encodeURIComponent('Rolling Ventures — Inbound from '+n)+'&body='+encodeURIComponent('Name: '+n+'\nEmail: '+em+'\n\n'+mg);document.getElementById('fw').style.display='none';document.getElementById('ok').style.display='block';document.getElementById('rf').reset();return false}
  </script>
</body>
</html>
