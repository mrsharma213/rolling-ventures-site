<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolling Ventures</title>
  <meta name="description" content="Rolling Ventures — Backing culture before it scales.">
  <meta property="og:title" content="Rolling Ventures">
  <meta property="og:description" content="Backing culture before it scales.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/rv-logo.svg">
  <link rel="icon" type="image/svg+xml" href="images/rv-logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 15vh 32px 48px;
    }

    /* H1 — Rolling Ventures */
    .h1 {
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    /* H2 — Tagline */
    .h2 {
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.4;
      color: #444;
      margin-bottom: 16px;
    }

    /* H3 — Supporting copy */
    .h3 {
      font-size: 0.9rem;
      font-weight: 300;
      color: #888;
      line-height: 1.55;
      max-width: 360px;
      margin-bottom: 44px;
    }

    /* Section label */
    .label {
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #aaa;
      margin-bottom: 20px;
    }

    /* Logo grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 24px;
      align-items: center;
      justify-items: center;
      width: 100%;
      max-width: 520px;
      margin-bottom: 44px;
    }

    .grid a, .grid span {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 42px;
    }

    .grid a { transition: opacity 0.15s ease; }
    .grid a:hover { opacity: 0.5; }

    .grid img {
      max-height: 34px;
      max-width: 105px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* CTA — H2 sizing */
    .cta {
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: #111;
      text-decoration: none;
      border-bottom: 1.5px solid #bbb;
      padding-bottom: 3px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .cta:hover { border-color: #111; }

    /* ---- Modal ---- */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      width: 90%;
      max-width: 400px;
      padding: 32px 24px 28px;
      border-radius: 4px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #aaa;
      line-height: 1;
      transition: color 0.15s;
    }
    .close:hover { color: #111; }

    .modal h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .f { margin-bottom: 14px; text-align: left; }

    .f label {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin-bottom: 5px;
    }

    .f input, .f textarea {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 9px 11px;
      border: 1px solid #ddd;
      border-radius: 3px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }
    .f input:focus, .f textarea:focus { border-color: #111; }
    .f textarea { height: 80px; resize: vertical; }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 11px 0;
      width: 100%;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }

    .ok { display: none; text-align: center; padding: 16px 0 4px; }
    .ok h2 { margin-bottom: 6px; }
    .ok p { font-size: 0.85rem; font-weight: 300; color: #777; }

    /* ---- Mobile ---- */
    @media (max-width: 520px) {
      .page {
        padding: 12vh 20px 36px;
      }

      .h1 { font-size: 1.8rem; }

      .h2 { font-size: 1.05rem; }

      .h3 { font-size: 0.82rem; margin-bottom: 32px; }

      .cta { font-size: 1.05rem; }

      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px 16px;
        margin-bottom: 32px;
      }

      .grid a, .grid span { height: 34px; }
      .grid img { max-height: 26px; max-width: 80px; }
    }

    @media (max-height: 700px) {
      .page { padding-top: 8vh; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="h1">Rolling Ventures</h1>
    <h2 class="h2">Backing culture before it scales</h2>
    <p class="h3">We make select investments throughout the year. To be considered, get in touch.</p>
    <p class="label">Select Investments</p>
    <div class="grid">
      <a href="https://www.eventbrite.com/cc/refuge-nyc-upcoming-shows-4796860" target="_blank" rel="noopener"><img src="images/refuge.svg" alt="Refuge"></a>
      <span><img src="images/mrbeast.png" alt="MrBeast"></span>
      <a href="https://mocama.com/" target="_blank" rel="noopener"><img src="images/mocama.png" alt="Mocama"></a>
      <span><img src="images/diamond-supply.png" alt="Diamond Supply"></span>
      <a href="https://getswishables.com/" target="_blank" rel="noopener"><img src="images/swishables.png" alt="Swishables"></a>
      <a href="https://www.midlinemiami.com/" target="_blank" rel="noopener"><img src="images/midline.png" alt="Midline"></a>
      <a href="https://goodonyaorganic.com/" target="_blank" rel="noopener"><img src="images/goodonya.png" alt="GoodOnya"></a>
      <span><img src="images/ketchy-shuby.png" alt="Ketchy Shuby"></span>
      <a href="https://www.outersignal.com/" target="_blank" rel="noopener"><img src="images/outersignal.png" alt="OuterSignal"></a>
      <a href="https://drinksprinter.com/" target="_blank" rel="noopener"><img src="images/sprinter.png" alt="Sprinter"></a>
      <span><img src="images/willies-remedy.jpg" alt="Willie's Remedy"></span>
    </div>
    <a class="cta" onclick="document.getElementById('m').classList.add('open')">Get in touch</a>
  </div>

  <div class="overlay" id="m">
    <div class="modal">
      <button class="close" onclick="cm()">&times;</button>
      <div id="fw">
        <h2>Get in touch</h2>
        <form id="rf" onsubmit="return sf(event)">
          <div class="f"><label for="n">Name</label><input type="text" id="n" name="name" required></div>
          <div class="f"><label for="e">Email</label><input type="email" id="e" name="email" required></div>
          <div class="f"><label for="mg">Message</label><textarea id="mg" name="message" required></textarea></div>
          <button type="submit" class="btn">Send</button>
        </form>
      </div>
      <div class="ok" id="ok"><h2>Thank you</h2><p>We'll be in touch.</p></div>
    </div>
  </div>

  <script>
    function cm(){var o=document.getElementById('m');o.classList.remove('open');setTimeout(function(){document.getElementById('fw').style.display='';document.getElementById('ok').style.display='none'},300)}
    document.getElementById('m').addEventListener('click',function(e){if(e.target===this)cm()});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')cm()});
    function sf(e){e.preventDefault();var n=document.getElementById('n').value,em=document.getElementById('e').value,mg=document.getElementById('mg').value;window.location.href='mailto:hello@rollingventures.com?subject='+encodeURIComponent('Rolling Ventures — Inbound from '+n)+'&body='+encodeURIComponent('Name: '+n+'\nEmail: '+em+'\n\n'+mg);document.getElementById('fw').style.display='none';document.getElementById('ok').style.display='block';document.getElementById('rf').reset();return false}
  </script>
</body>
</html>
