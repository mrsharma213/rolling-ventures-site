<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolling Ventures</title>
  <meta name="description" content="Rolling Ventures — Backing culture before it scales.">
  <meta property="og:title" content="Rolling Ventures">
  <meta property="og:description" content="Backing culture before it scales.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rollingventures.com">
  <meta property="og:image" content="https://rollingventures.com/images/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rolling Ventures">
  <meta name="twitter:description" content="Backing culture before it scales.">
  <meta name="twitter:image" content="https://rollingventures.com/images/og-image.jpg">
  <link rel="icon" type="image/svg+xml" href="images/rv-icon.svg">
  <link rel="apple-touch-icon" href="images/rv-icon.svg">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#ffffff;--fg:#111;--fg2:#555;--fg3:#999;
      --rule:#e8e8e8;--label:#bbb;
      --btn-border:#111;--btn-hover-bg:#111;--btn-hover-fg:#fff;
      --modal-bg:#fff;--overlay:rgba(0,0,0,0.35);
      --input-border:#ddd;--btn-bg:#111;--btn-fg:#fff;--btn-h:#333;
    }


    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--fg);
      -webkit-font-smoothing:antialiased;
    }

    /* ===== PAGE LAYOUT ===== */
    .page{
      max-width:560px;
      margin:0 auto;
      padding:80px 28px 64px;
    }

    /* ===== HERO SECTION ===== */
    .hero{
      margin-bottom:56px;
    }
    .hero h1{
      font-size:2.6rem;
      font-weight:600;
      line-height:1.1;
      letter-spacing:-0.03em;
      margin-bottom:16px;
    }
    .hero h2{
      font-size:1.15rem;
      font-weight:400;
      color:var(--fg2);
      line-height:1.45;
      margin-bottom:14px;
    }
    .hero p{
      font-size:0.88rem;
      font-weight:300;
      color:var(--fg3);
      line-height:1.6;
    }

    /* ===== DIVIDER ===== */
    .rule{
      border:none;
      border-top:1px solid var(--rule);
      margin:0 0 40px;
    }

    /* ===== PORTFOLIO SECTION ===== */
    .portfolio{
      margin-bottom:56px;
    }
    .section-label{
      font-size:0.62rem;
      font-weight:500;
      text-transform:uppercase;
      letter-spacing:0.2em;
      color:var(--label);
      margin-bottom:28px;
    }

    /* Logo grid — 3 columns for 11 items (3+3+3+2, last row centered) */
    .logos{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:24px 32px;
    }
    .logos a,.logos span{
      display:flex;
      align-items:center;
      justify-content:center;
      width:140px;
      height:52px;
    }
    .logos a{transition:opacity 0.15s}
    .logos a:hover{opacity:0.45}
    .logos img{
      max-height:38px;
      max-width:120px;
      width:auto;height:auto;
      object-fit:contain;
    }


    /* ===== CTA SECTION ===== */
    .contact{
      text-align:center;
    }
    .cta-btn{
      font-family:'Inter',sans-serif;
      font-size:1rem;
      font-weight:500;
      letter-spacing:0.02em;
      color:var(--fg);
      text-decoration:none;
      border:1.5px solid var(--btn-border);
      padding:14px 48px;
      border-radius:3px;
      cursor:pointer;
      display:inline-block;
      transition:background 0.15s,color 0.15s;
    }
    .cta-btn:hover{background:var(--btn-hover-bg);color:var(--btn-hover-fg)}

    /* ===== MODAL ===== */
    .overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
    .overlay.open{display:flex}
    .modal{background:var(--modal-bg);width:90%;max-width:400px;padding:32px 24px 28px;border-radius:6px;position:relative}
    .x{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--fg3);line-height:1;transition:color 0.15s}
    .x:hover{color:var(--fg)}
    .modal h2{font-size:1rem;font-weight:600;margin-bottom:20px}
    .f{margin-bottom:14px;text-align:left}
    .f label{display:block;font-size:0.62rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--label);margin-bottom:5px}
    .f input,.f textarea{width:100%;font-family:'Inter',sans-serif;font-size:0.85rem;padding:10px 12px;border:1px solid var(--input-border);border-radius:4px;color:var(--fg);background:var(--bg);outline:none;transition:border-color 0.15s}
    .f input:focus,.f textarea:focus{border-color:var(--fg)}
    .f textarea{height:80px;resize:vertical}
    .submit{font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:500;background:var(--btn-bg);color:var(--btn-fg);border:none;border-radius:4px;padding:12px 0;width:100%;cursor:pointer;margin-top:6px;transition:background 0.15s}
    .submit:hover{background:var(--btn-h)}
    .ok{display:none;text-align:center;padding:20px 0 8px}
    .ok h2{margin-bottom:6px}
    .ok p{font-size:0.85rem;font-weight:300;color:var(--fg3)}

    /* ===== FOOTER ===== */
    .foot{
      text-align:center;
      padding-top:40px;
      font-size:0.68rem;
      color:var(--fg3);
      letter-spacing:0.02em;
    }

    /* ===== RESPONSIVE ===== */
    @media(max-width:520px){
      .page{padding:48px 20px 48px}
      .hero h1{font-size:2rem}
      .hero h2{font-size:1.02rem}
      .hero p{font-size:0.82rem}
      .hero{margin-bottom:40px}
      .logos a,.logos span{width:100px;height:40px}
      .logos img{max-height:28px;max-width:90px}
      .logos{gap:16px 20px}
      .portfolio{margin-bottom:40px}
      .cta-btn{font-size:0.92rem;padding:12px 36px}
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- HERO -->
    <section class="hero">
      <h1>Rolling Ventures</h1>
      <h2>Backing culture before it scales</h2>
      <p>We make select investments in consumer, tech, and culture throughout the year.</p>
    </section>

    <hr class="rule">

    <!-- PORTFOLIO -->
    <section class="portfolio">
      <p class="section-label">Select Investments</p>
      <div class="logos">
        <a href="https://www.eventbrite.com/cc/refuge-nyc-upcoming-shows-4796860" target="_blank" rel="noopener"><img src="images/refuge.svg" alt="Refuge"></a>
        <span><img src="images/mrbeast.png" alt="MrBeast"></span>
        <a href="https://mocama.com/" target="_blank" rel="noopener"><img src="images/mocama.png" alt="Mocama"></a>
        <span><img src="images/diamond-supply.png" alt="Diamond Supply"></span>
        <a href="https://getswishables.com/" target="_blank" rel="noopener"><img src="images/swishables.png" alt="Swishables"></a>
        <a href="https://www.midlinemiami.com/" target="_blank" rel="noopener"><img src="images/midline.png" alt="Midline"></a>
        <a href="https://goodonyaorganic.com/" target="_blank" rel="noopener"><img src="images/goodonya.png" alt="GoodOnya"></a>
        <span><img src="images/ketchy-shuby.png" alt="Ketchy Shuby"></span>
        <a href="https://www.outersignal.com/" target="_blank" rel="noopener"><img src="images/outersignal.png" alt="OuterSignal"></a>
        <a href="https://drinksprinter.com/" target="_blank" rel="noopener"><img src="images/sprinter.png" alt="Sprinter"></a>
        <span><img src="images/willies-remedy.jpg" alt="Willie's Remedy"></span>
      </div>
    </section>

    <hr class="rule">

    <!-- CTA -->
    <section class="contact">
      <a class="cta-btn" onclick="document.getElementById('m').classList.add('open')">Get in touch</a>
    </section>

    <footer class="foot">© Rolling Ventures</footer>
  </div>

  <!-- MODAL -->
  <div class="overlay" id="m">
    <div class="modal">
      <button class="x" onclick="cm()">&times;</button>
      <div id="fw">
        <h2>Get in touch</h2>
        <form id="rf" onsubmit="return sf(event)">
          <div class="f"><label for="n">Name</label><input type="text" id="n" name="name" required></div>
          <div class="f"><label for="e">Email</label><input type="email" id="e" name="email" required></div>
          <div class="f"><label for="mg">Message</label><textarea id="mg" name="message" required></textarea></div>
          <button type="submit" class="submit">Send</button>
        </form>
      </div>
      <div class="ok" id="ok"><h2>Thank you</h2><p>We'll be in touch.</p></div>
    </div>
  </div>

  <script>
    function cm(){var o=document.getElementById('m');o.classList.remove('open');setTimeout(function(){document.getElementById('fw').style.display='';document.getElementById('ok').style.display='none'},300)}
    document.getElementById('m').addEventListener('click',function(e){if(e.target===this)cm()});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')cm()});
    function sf(e){e.preventDefault();var n=document.getElementById('n').value,em=document.getElementById('e').value,mg=document.getElementById('mg').value;window.location.href='mailto:hello@rollingventures.com?subject='+encodeURIComponent('Rolling Ventures — Inbound from '+n)+'&body='+encodeURIComponent('Name: '+n+'\nEmail: '+em+'\n\n'+mg);document.getElementById('fw').style.display='none';document.getElementById('ok').style.display='block';document.getElementById('rf').reset();return false}
  </script>
</body>
</html>
