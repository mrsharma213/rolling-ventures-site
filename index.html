<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolling Ventures</title>
  <meta name="description" content="Rolling Ventures — Backing culture before it scales.">
  <meta property="og:title" content="Rolling Ventures">
  <meta property="og:description" content="Backing culture before it scales.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/rv-logo.svg">
  <link rel="icon" type="image/svg+xml" href="images/rv-logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #111;
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      width: 100%;
      max-width: 640px;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---- Logo ---- */
    .logo {
      width: 56px;
      height: auto;
      margin-bottom: 40px;
    }

    /* ---- Headline / Tagline ---- */
    .tagline {
      font-size: 2.25rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.025em;
      margin-bottom: 20px;
    }

    /* ---- Supporting copy ---- */
    .copy {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.6;
      color: #666;
      max-width: 380px;
      margin-bottom: 48px;
    }

    /* ---- Portfolio logos ---- */
    .portfolio-label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #999;
      margin-bottom: 24px;
    }

    .logos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 28px;
      align-items: center;
      justify-items: center;
      width: 100%;
      margin-bottom: 48px;
    }

    .logos a,
    .logos span {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
    }

    .logos a {
      transition: opacity 0.2s ease;
    }

    .logos a:hover {
      opacity: 0.55;
    }

    .logos img {
      max-height: 36px;
      max-width: 110px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* ---- CTA ---- */
    .cta {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #111;
      text-decoration: none;
      border-bottom: 1.5px solid #ccc;
      padding-bottom: 3px;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .cta:hover {
      border-color: #111;
    }

    /* ---- Modal ---- */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      width: 90%;
      max-width: 420px;
      padding: 36px 28px 32px;
      border-radius: 4px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 1.25rem;
      cursor: pointer;
      color: #999;
      transition: color 0.15s ease;
      line-height: 1;
    }

    .modal-close:hover {
      color: #111;
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 3px;
      background: #fff;
      color: #111;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #111;
    }

    .field textarea {
      height: 90px;
      resize: vertical;
    }

    .send-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 12px 0;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s ease;
    }

    .send-btn:hover {
      background: #333;
    }

    .success {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
    }

    .success h2 {
      margin-bottom: 8px;
    }

    .success p {
      font-size: 0.88rem;
      font-weight: 300;
      color: #666;
    }

    /* ---- Responsive ---- */
    @media (max-width: 520px) {
      .page {
        padding: 36px 24px;
      }

      .logo {
        width: 44px;
        margin-bottom: 32px;
      }

      .tagline {
        font-size: 1.75rem;
      }

      .copy {
        font-size: 0.88rem;
        margin-bottom: 36px;
      }

      .logos {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px 20px;
        margin-bottom: 36px;
      }

      .logos a,
      .logos span {
        height: 36px;
      }

      .logos img {
        max-height: 28px;
        max-width: 85px;
      }

      .modal {
        padding: 28px 22px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <img src="images/rv-logo.svg" alt="Rolling Ventures" class="logo">

    <h1 class="tagline">Backing culture before it scales</h1>

    <p class="copy">We make select investments throughout the year. To be considered, get in touch.</p>

    <p class="portfolio-label">Select Investments</p>

    <div class="logos">
      <a href="https://www.eventbrite.com/cc/refuge-nyc-upcoming-shows-4796860" target="_blank" rel="noopener"><img src="images/refuge.svg" alt="Refuge"></a>
      <span><img src="images/mrbeast.png" alt="MrBeast"></span>
      <a href="https://mocama.com/" target="_blank" rel="noopener"><img src="images/mocama.png" alt="Mocama"></a>
      <span><img src="images/diamond-supply.png" alt="Diamond Supply"></span>
      <a href="https://getswishables.com/" target="_blank" rel="noopener"><img src="images/swishables.png" alt="Swishables"></a>
      <a href="https://www.midlinemiami.com/" target="_blank" rel="noopener"><img src="images/midline.png" alt="Midline"></a>
      <a href="https://goodonyaorganic.com/" target="_blank" rel="noopener"><img src="images/goodonya.png" alt="GoodOnya"></a>
      <span><img src="images/ketchy-shuby.png" alt="Ketchy Shuby"></span>
      <a href="https://www.outersignal.com/" target="_blank" rel="noopener"><img src="images/outersignal.png" alt="OuterSignal"></a>
      <a href="https://drinksprinter.com/" target="_blank" rel="noopener"><img src="images/sprinter.png" alt="Sprinter"></a>
      <span><img src="images/willies-remedy.jpg" alt="Willie's Remedy"></span>
    </div>

    <a class="cta" onclick="document.getElementById('modal').classList.add('open')">Get in touch</a>
  </div>

  <!-- Contact Modal -->
  <div class="overlay" id="modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="formWrap">
        <h2>Get in touch</h2>
        <form id="rvForm" onsubmit="return send(event)">
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="field">
            <label for="msg">Message</label>
            <textarea id="msg" name="message" required></textarea>
          </div>
          <button type="submit" class="send-btn">Send</button>
        </form>
      </div>
      <div class="success" id="success">
        <h2>Thank you</h2>
        <p>We'll be in touch.</p>
      </div>
    </div>
  </div>

  <script>
    function closeModal() {
      var m = document.getElementById('modal');
      m.classList.remove('open');
      // Reset after close
      setTimeout(function() {
        document.getElementById('formWrap').style.display = '';
        document.getElementById('success').style.display = 'none';
      }, 300);
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    function send(e) {
      e.preventDefault();
      var n = document.getElementById('name').value;
      var em = document.getElementById('email').value;
      var msg = document.getElementById('msg').value;
      var subj = encodeURIComponent('Rolling Ventures — Inbound from ' + n);
      var body = encodeURIComponent('Name: ' + n + '\nEmail: ' + em + '\n\n' + msg);
      window.location.href = 'mailto:hello@rollingventures.com?subject=' + subj + '&body=' + body;
      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      document.getElementById('rvForm').reset();
      return false;
    }
  </script>
</body>
</html>
